version: '3.9'

services:
  creature-cards:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: creature-cards
    ports:
      - "8080:80"      # Frontend
      - "8545:8545"    # Anvil RPC (нужен MetaMask)
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
